name: update versions

on:
  # Run after the "documentation" workflow completes.
  # The job itself is further restricted below to successful runs only.
  workflow_run:
    workflows: ["documentation"]
    types:
      - completed

  # Allow manual execution from the Actions tab.
  workflow_dispatch:

permissions:
  # Required to commit and push updates to the gh-pages branch.
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    # Run automatically only when the triggering documentation workflow
    # succeeds, or allow the job to run when started manually.
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success') ||
       github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out the current branch
        uses: actions/checkout@v6

      - name: Copy the update_versions.py script
        # Preserve the script before switching branches in the next step.
        run: cp docs/source/update_versions.py /tmp/update_versions.py

      - name: Check out gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate version_switcher.json and index.html
        # Create or update the version metadata and landing page content.
        run: python /tmp/update_versions.py

      - name: Deploy to GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./versionfiles
          destination_dir: .
          keep_files: true
          commit_message: "Update version numbering"